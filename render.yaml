services:
  # 1. Python FastAPI ML prediction backend service
  - type: web
    name: rateiq-backend
    env: docker
    dockerfilePath: backend/Dockerfile
    dockerContext: .
    plan: free
    envVars:
      - key: PORT
        value: 8000
      - key: PYTHONDONTWRITEBYTECODE
        value: "1"
      - key: PYTHONUNBUFFERED
        value: "1"

  # 2. Node.js Express full-stack web frontend service
  - type: web
    name: rateiq-web
    env: docker
    dockerfilePath: Dockerfile
    dockerContext: .
    plan: free
    envVars:
      - key: PORT
        value: 3000
      - key: NODE_ENV
        value: production
      - key: BACKEND_URL
        fromService:
          name: rateiq-backend
          type: web
          property: host
      # EmailJS credentials for contact form submissions (can be filled in during deployment)
      - key: VITE_EMAILJS_SERVICE_ID
        sync: false
      - key: VITE_EMAILJS_TEMPLATE_ID
        sync: false
      - key: VITE_EMAILJS_PUBLIC_KEY
        sync: false
